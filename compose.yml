services:
  api:
    build:
      context: ./saleor
      dockerfile: Dockerfile
    ports:
      - 28000:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
      # Hot reload: mount source code for development
      - ./saleor:/app:z
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=http://localhost:29000/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api
      - ALLOWED_GRAPHQL_ORIGINS=http://localhost:29000,http://127.0.0.1:29000

  dashboard:
    build:
      context: ./saleor-dashboard
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:28000/graphql/
    ports:
      - 29000:80
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      # Hot reload: mount source code for development
      - ./saleor-dashboard/src:/app/src:z
      - ./saleor-dashboard/public:/app/public:z
      - ./saleor-dashboard/package.json:/app/package.json:z
      - ./saleor-dashboard/tsconfig.json:/app/tsconfig.json:z
    environment:
      - API_URL=http://localhost:28000/graphql/
      - CHOKIDAR_USEPOLLING=true

  db:
    image: library/postgres:15-alpine
    ports:
      - 25432:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor

  cache:
    image: valkey/valkey:8.1-alpine
    ports:
      - 26379:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data

  worker:
    build:
      context: ./saleor
      dockerfile: Dockerfile
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    depends_on:
      - cache
      - mailpit
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
      # Hot reload: mount source code for development
      - ./saleor:/app:z

  jaeger:
    image: jaegertracing/jaeger
    ports:
      - "28686:16686"
      - "24317:4317"
      - "24318:4318"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - type: tmpfs
        target: /tmp

  mailpit:
    image: axllent/mailpit
    ports:
      - 21025:1025 # smtp server
      - 28025:8025 # web ui. Visit http://localhost:28025/ to check emails
    restart: unless-stopped
    networks:
      - saleor-backend-tier

volumes:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  saleor-media:

networks:
  saleor-backend-tier:
    driver: bridge
